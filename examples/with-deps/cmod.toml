[package]
name = "with-deps"
version = "0.1.0"
edition = "2023"
description = "Example using Git dependencies (fmt + json)"
authors = ["cmod contributors"]
license = "Apache-2.0"

[module]
name = "local.with_deps"
root = "src/lib.cppm"

[dependencies]
"github.com/satishbabariya/fmt-cmod" = "^0.1"
"github.com/satishbabariya/json-cmod" = { version = "^0.1", branch = "develop" }

[toolchain]
compiler = "clang"
cxx_standard = "20"

[build]
type = "binary"
