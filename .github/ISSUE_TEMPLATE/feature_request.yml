name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should cmod solve this problem?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about.

  - type: dropdown
    id: rfc-tier
    attributes:
      label: RFC Tier
      description: Which RFC tier does this feature belong to?
      options:
        - Core (must implement first)
        - "Tier 1: Essential features"
        - "Tier 2: Developer experience"
        - "Tier 3: Advanced"
        - "Tier 4: Ecosystem"
        - Not sure
